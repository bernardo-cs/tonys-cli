# goreleaser configuration — https://goreleaser.com
# Build locally with:  goreleaser release --snapshot --clean
version: 2

project_name: tonys

before:
  hooks:
    - go mod tidy

builds:
  - id: tonys
    main: ./cmd/tonys
    binary: tonys
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/bernardo-cs/tonys-cli/internal/cli.Version={{ .Version }}

archives:
  - id: tonys
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE

# Native Linux packages (.deb / .rpm / .apk) for the common distro families,
# attached to each GitHub release. nfpm is built into goreleaser (pure Go), so no
# dpkg/rpmbuild toolchain is required. ffmpeg/yt-dlp are declared as weak
# (recommends/suggests) deps so they never block installation.
nfpms:
  - id: tonys
    package_name: tonys
    ids: [tonys]
    vendor: Bernardo Simoes
    homepage: "https://github.com/bernardo-cs/tonys-cli"
    maintainer: Bernardo Simoes <bersimoes+git@gmail.com>
    description: Agent-friendly CLI for the TonieCloud API.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    recommends:
      - ffmpeg
    suggests:
      - yt-dlp
    contents:
      - src: LICENSE
        dst: /usr/share/doc/tonys/LICENSE
      - src: README.md
        dst: /usr/share/doc/tonys/README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

# Publishes a Homebrew cask to github.com/bernardo-cs/homebrew-tap so users can
# `brew install bernardo-cs/tap/tonys`. (Casks are goreleaser's current path for
# distributing prebuilt CLI binaries; the older `brews`/formula key is deprecated.)
# Requires:
#   1. an (initially empty) public repo named `homebrew-tap` under bernardo-cs
#   2. a repo secret HOMEBREW_TAP_GITHUB_TOKEN (a PAT with `contents:write` on
#      that tap repo) — the default GITHUB_TOKEN cannot push to another repo.
# ffmpeg / yt-dlp are intentionally NOT declared as dependencies: they are
# optional (plain uploads and every API command work without them).
homebrew_casks:
  - name: tonys
    repository:
      owner: bernardo-cs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/bernardo-cs/tonys-cli"
    description: "Agent-friendly CLI for the TonieCloud API"
    commit_author:
      name: bernardo-cs
      email: bersimoes+git@gmail.com
    caveats: |
      tonys shells out to two optional tools for some features:
        ffmpeg  - audio conversion & loudness normalization
        yt-dlp  - the `yt` YouTube importer
      Install them only if you need those features:
        brew install ffmpeg yt-dlp
